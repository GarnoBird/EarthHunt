<style>
:root{
  --hot:#ff2d78;
  --teal:#00f5d4;
  --gold:#ffb830;
  --bg:#080810;
  --surface:#0e0e1a;
  --surface2:#141428;
  --text:#f0e6ff;
  --muted:#8878a8;
  --head:'Bebas Neue',sans-serif;
  --body:'Inter',sans-serif;
  --mono:'Space Mono',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}

body{
  background:var(--bg);
  background-image:
    radial-gradient(ellipse 100% 60% at 50% 0%, #1a0028 0%, transparent 70%),
    radial-gradient(ellipse 60% 40% at 0% 100%, #00100e 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 100% 100%, #1a000d 0%, transparent 50%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:24px 16px;
  font-family:var(--body);color:var(--text);
  min-height:100vh;
}

/* Subtle grid floor */
body::after{
  content:'';position:fixed;bottom:0;left:0;right:0;height:40vh;pointer-events:none;z-index:0;
  background:
    linear-gradient(transparent 0%, #ff2d7808 100%),
    repeating-linear-gradient(90deg,#ff2d7808 0px,transparent 1px,transparent 60px,#ff2d7808 61px),
    repeating-linear-gradient(0deg,#ff2d7808 0px,transparent 1px,transparent 40px,#ff2d7808 41px);
  mask-image:linear-gradient(to top,rgba(0,0,0,.3),transparent);
}

.card{
  position:relative;z-index:1;
  background:linear-gradient(160deg,#0f0f1e 0%,#0a0a16 100%);
  border-radius:20px;
  padding:32px 28px;
  border:1px solid #ffffff0f;
  box-shadow:
    0 0 0 1px #ff2d780a,
    0 40px 100px #00000099,
    0 0 80px #ff2d7806,
    inset 0 1px 0 #ffffff0a;
  max-width:420px;width:100%;
}

/* Neon top bar */
.card::before{
  content:'';position:absolute;top:0;left:40px;right:40px;height:1px;border-radius:1px;
  background:linear-gradient(90deg,transparent,#ff2d78cc,#00f5d499,transparent);
  box-shadow:0 0 12px #ff2d7866,0 0 24px #ff2d7822;
}

/* Fonts */
.head{font-family:var(--head);letter-spacing:3px;}
.mono{font-family:var(--mono);font-size:11px;}

/* Inputs */
button{font-family:var(--body);cursor:pointer;border:none;}
input,textarea,select{font-family:var(--mono);}

.inp{
  background:#ffffff07;
  border:1px solid #ffffff12;
  border-radius:10px;
  color:var(--text);
  padding:12px 16px;
  font-size:12px;
  width:100%;
  outline:none;
  transition:border-color .2s,box-shadow .2s;
}
.inp::placeholder{color:var(--muted);opacity:.7;}
.inp:focus{border-color:#ff2d7844;box-shadow:0 0 16px #ff2d7814;}
select.inp option{background:#0e0e1a;color:var(--text);}

/* Primary button — hot pink neon */
.btn-main{
  background:linear-gradient(135deg,#ff2d78 0%,#c4004f 100%);
  border:none;border-radius:12px;
  color:#fff;
  padding:15px 20px;
  font-family:var(--head);font-size:17px;letter-spacing:4px;
  width:100%;cursor:pointer;
  box-shadow:0 0 24px #ff2d7840,0 6px 24px #00000055;
  transition:all .25s;
  text-shadow:0 1px 4px #00000033;
}
.btn-main:hover{box-shadow:0 0 40px #ff2d7866,0 6px 24px #00000055;transform:translateY(-2px);}
.btn-main:active{transform:translateY(0);}
.btn-main:disabled{opacity:.3;cursor:default;transform:none;box-shadow:none;}

/* Secondary — teal outline */
.btn-teal{
  background:transparent;
  border:1px solid #00f5d466;
  border-radius:12px;
  color:#00f5d4;
  padding:14px 20px;
  font-family:var(--head);font-size:17px;letter-spacing:4px;
  width:100%;cursor:pointer;
  box-shadow:0 0 16px #00f5d414,inset 0 0 16px #00f5d406;
  transition:all .25s;
}
.btn-teal:hover{box-shadow:0 0 30px #00f5d433,inset 0 0 20px #00f5d410;border-color:#00f5d499;}

/* Ghost */
.btn-ghost{
  background:transparent;
  border:1px solid #ffffff14;
  border-radius:10px;
  color:var(--muted);
  padding:12px 20px;
  font-family:var(--body);font-size:13px;font-weight:500;
  width:100%;cursor:pointer;
  transition:all .2s;
}
.btn-ghost:hover{border-color:#ffffff28;color:var(--text);}

.gap{display:flex;flex-direction:column;gap:12px;}
.err{
  background:#ff2d7810;border:1px solid #ff2d7840;
  border-radius:10px;padding:10px 14px;
  color:#ff7aaa;font-family:var(--mono);font-size:11px;line-height:1.6;
}
.hidden{display:none;}

/* Section label */
.label{
  font-family:var(--mono);font-size:10px;color:var(--muted);
  letter-spacing:2px;text-transform:uppercase;
}

/* Toggle */
.toggle-row{
  display:flex;align-items:center;justify-content:space-between;
  background:#ffffff05;border:1px solid #ffffff0e;
  border-radius:10px;padding:12px 16px;
}
.toggle-label{font-size:14px;font-weight:500;color:var(--text);}
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.toggle-slider{position:absolute;inset:0;background:#ffffff18;border-radius:24px;transition:.3s;cursor:pointer;}
.toggle-slider:before{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:var(--muted);border-radius:50%;transition:.3s;}
.toggle input:checked+.toggle-slider{background:linear-gradient(135deg,#ff2d78,#d4005a);box-shadow:0 0 10px #ff2d7866;}
.toggle input:checked+.toggle-slider:before{transform:translateX(20px);background:#fff;}

/* Map */
#map-picker{width:100%;height:240px;border-radius:12px;border:1px solid #ffffff12;overflow:hidden;cursor:crosshair;}
.leaflet-container{background:#080810;}

/* Leaderboard */
.leader-row{
  display:flex;align-items:center;gap:10px;
  padding:9px 14px;margin-bottom:5px;
  border-radius:10px;background:#ffffff06;border:1px solid #ffffff0a;
}
.leader-row.me{background:#ff2d7810;border-color:#ff2d7830;}
.leader-rank{font-family:var(--head);font-size:14px;color:var(--gold);width:24px;text-align:center;}
.leader-name{flex:1;font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.leader-dist{font-size:11px;color:var(--muted);font-family:var(--mono);}

/* Divider */
.neon-line{height:1px;background:linear-gradient(90deg,transparent,var(--hot) 30%,var(--teal) 70%,transparent);opacity:.3;margin:4px 0;}

@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn .35s ease forwards;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}
@keyframes hotPulse{0%,100%{text-shadow:0 0 20px #ff2d78,0 0 40px #ff2d7866}50%{text-shadow:0 0 40px #ff2d78,0 0 80px #ff2d78aa}}
@keyframes spinSlow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

const EARTH_R=6371000;
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}
function calcBearing(from,to){
  const dLon=toRad(to.lon-from.lon),la1=toRad(from.lat),la2=toRad(to.lat);
  const y=Math.sin(dLon)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return(toDeg(Math.atan2(y,x))+360)%360;
}
function calcDistance(from,to){
  const dLat=toRad(to.lat-from.lat),dLon=toRad(to.lon-from.lon);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(from.lat))*Math.cos(toRad(to.lat))*Math.sin(dLon/2)**2;
  return EARTH_R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function cardinal(d){return["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8];}
function fmtDist(m,unit){
  if(unit==='ft') return Math.round(m*3.28084).toLocaleString()+' ft';
  if(unit==='m')  return Math.round(m).toLocaleString()+' m';
  const ft=Math.round(m*3.28084);
  return ft<1000?ft+' ft':((m/1609.34).toFixed(1)+' mi');
}

function encode(obj){return btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');}
function decode(code){
  try{
    const b64=code.trim().replace(/-/g,'+').replace(/_/g,'/');
    const pad=(4-b64.length%4)%4;
    const obj=JSON.parse(atob(b64+'='.repeat(pad)));
    if(typeof obj.lat==='number'&&typeof obj.lon==='number') return obj;
  }catch(e){}
  return null;
}
function huntId(hunt){
  const key=`${hunt.lat.toFixed(5)}_${hunt.lon.toFixed(5)}_${hunt.ts}`;
  let h=0;for(let i=0;i<key.length;i++){h=(Math.imul(31,h)+key.charCodeAt(i))|0;}
  return 'h'+(h>>>0).toString(36);
}

// COMPASS SVG — Miami neon style
function compassSVG(){
  const ticks=Array.from({length:72},(_,i)=>{
    const a=i*5,r=toRad(a-90);
    const big=a%90===0,med=a%45===0,sm=a%15===0;
    const len=big?18:med?11:sm?6:3;
    const x1=120+106*Math.cos(r),y1=120+106*Math.sin(r);
    const x2=120+(106-len)*Math.cos(r),y2=120+(106-len)*Math.sin(r);
    const col=big?'#ff2d7888':med?'#00f5d444':sm?'#ffffff18':'#ffffff0a';
    return`<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${big?2:1}"/>`;
  }).join('');

  const labels=[['N',0],['E',90],['S',180],['W',270]].map(([l,deg])=>{
    const r=toRad(deg-90),x=120+88*Math.cos(r),y=120+88*Math.sin(r);
    return`<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
      font-family="Bebas Neue,sans-serif" font-size="${l==='N'?14:11}"
      fill="${l==='N'?'#ff2d78':'#ffffff44'}" letter-spacing="2">${l}</text>`;
  }).join('');

  return`<svg id="compass-svg" width="240" height="240" viewBox="0 0 240 240"
    style="display:block;margin:0 auto;filter:drop-shadow(0 0 24px #ff2d7833) drop-shadow(0 0 8px #00000088);">
    <defs>
      <radialGradient id="cbg" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#1a0015"/>
        <stop offset="60%" stop-color="#0e000f"/>
        <stop offset="100%" stop-color="#080810"/>
      </radialGradient>
      <filter id="glow">
        <feGaussianBlur stdDeviation="3" result="blur"/>
        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <!-- Outer ring -->
    <circle cx="120" cy="120" r="118" fill="url(#cbg)" stroke="#ff2d7820" stroke-width="1.5"/>
    <!-- Inner accent ring -->
    <circle cx="120" cy="120" r="109" fill="none" stroke="#00f5d410" stroke-width="1"/>
    ${ticks}${labels}
    <!-- Arrow group — pink tip = FOLLOW THIS DIRECTION -->
    <g id="compass-arrow" transform="rotate(0,120,120)" filter="url(#glow)">
      <!-- South tail: very dim so it doesn't confuse -->
      <polygon points="120,218 128,136 120,144 112,136" fill="#ffffff" opacity=".08"/>
      <!-- North body -->
      <polygon points="120,108 130,108 120,22 110,108" fill="#ff2d78" opacity=".7"/>
      <!-- North bright leading tip — the thing to follow -->
      <polygon points="120,22 128,72 120,62 112,72" fill="#ff2d78"/>
      <polygon points="120,22 124,46 120,42 116,46" fill="#ffffff" opacity=".7"/>
      <!-- Center hub -->
      <circle cx="120" cy="120" r="10" fill="#080810" stroke="#ff2d7888" stroke-width="1.5"/>
      <circle cx="120" cy="120" r="4" fill="#ff2d78"/>
      <!-- "GO" label near the tip -->
      <text x="120" y="10" text-anchor="middle" dominant-baseline="middle"
        font-family="Bebas Neue,sans-serif" font-size="9" fill="#ff2d78"
        letter-spacing="2" opacity=".9">GO</text>
    </g>
  </svg>`;
}

// HUNT SCREEN
function tmplHunt(){
  const h=S.hunt;

  if(S.found){
    return`
    <div class="gap fade-in" style="align-items:center;text-align:center;">
      <div style="font-size:60px;animation:bounce .9s ease infinite;">🏆</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:38px;letter-spacing:5px;
        color:#ff2d78;text-shadow:0 0 30px #ff2d78,0 0 60px #ff2d7866;animation:hotPulse 2s infinite;">
        YOU FOUND IT
      </div>
      <div style="color:var(--muted);font-size:13px;font-weight:500;">${esc(h.name)}</div>
      ${h.message?`
      <div style="background:#ff2d7810;border:1px solid #ff2d7833;border-radius:12px;
        padding:20px;font-size:15px;line-height:1.8;color:var(--text);width:100%;
        font-weight:400;font-style:italic;">
        "${esc(h.message)}"
      </div>`:''}
      <button class="btn-ghost" onclick="leaveHunt()" style="margin-top:4px;">← Leave hunt</button>
    </div>`;
  }

  const leaderSection=h.leaderboard?`
  <div id="leaderboard-section" style="width:100%;">
    <div class="neon-line" style="margin-bottom:12px;"></div>
    <div class="label" style="margin-bottom:10px;">Leaderboard</div>
    <div id="leaderboard-rows">
      <div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
        text-align:center;padding:12px;animation:signalPulse 2s infinite;">
        Waiting for players…
      </div>
    </div>
  </div>`:'';

  return`
  <div class="gap fade-in" style="align-items:center;">
    <div style="text-align:center;">
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:4px;">HUNTING</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:3px;color:#ff2d78;">${esc(h.name)}</div>
    </div>

    ${compassSVG()}

    <div id="compass-btn-wrap" style="display:none;text-align:center;">
      <button class="btn-main" style="font-size:14px;padding:14px 28px;width:auto;letter-spacing:2px;" onclick="requestCompass()">
        🧭 Enable Compass
      </button>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;letter-spacing:1px;">tap to activate bearing</div>
    </div>

    <div id="hunt-status" style="text-align:center;min-height:70px;display:flex;align-items:center;justify-content:center;">
      <div style="font-family:'Space Mono',monospace;font-size:12px;color:var(--muted);
        letter-spacing:2px;animation:signalPulse 2s infinite;">Acquiring signal…</div>

      color:#00f5d4;text-align:center;letter-spacing:2px;min-height:18px;"></div>`:''}

    ${!h.showDist?`
    <div style="background:#ffffff04;border:1px solid #ffffff08;border-radius:10px;
      padding:12px 18px;text-align:center;width:100%;">
      <div style="font-size:12px;color:var(--muted);font-weight:300;line-height:1.8;letter-spacing:.2px;">
        The fun is figuring out how to get there.
      </div>
    </div>`:''}

    ${leaderSection}

    <button class="btn-ghost" onclick="leaveHunt()" style="font-size:12px;">← Leave hunt</button>
  </div>`;
}

// UPDATE COMPASS
function updateCompass(){
  if(S.found){render();return;}
  const arrow=document.getElementById('compass-arrow');
  const status=document.getElementById('hunt-status');
  const distEl=document.getElementById('hunt-dist');
  if(!arrow||!status)return;

  if(!S.userPos){
    if(!S.spinInterval){
      let deg=0;
      S.spinInterval=setInterval(()=>{
        deg=(deg+3)%360;
        const a=document.getElementById('compass-arrow');
        if(a) a.setAttribute('transform',`rotate(${deg},120,120)`);
        else{clearInterval(S.spinInterval);S.spinInterval=null;}
      },16);
    }
  } else {
    if(S.spinInterval){clearInterval(S.spinInterval);S.spinInterval=null;}
    arrow.setAttribute('transform',`rotate(${S.displayBearing},120,120)`);
    status.innerHTML=`
      <div>
        <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);letter-spacing:3px;margin-bottom:6px;">THE TREASURE LIES</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:52px;color:#ff2d78;letter-spacing:3px;line-height:1;
          text-shadow:0 0 30px #ff2d7888;">${Math.round(S.displayBearing)}°</div>
        <div style="font-family:'Space Mono',monospace;font-size:12px;color:#00f5d4;margin-top:6px;letter-spacing:5px;">${cardinal(S.displayBearing)}</div>
      </div>`;
    if(distEl&&S.currentDist!=null)
      distEl.textContent=fmtDist(S.currentDist,S.hunt.units)+' away';
  }
}

// LEADERBOARD
function updateLeaderboard(){
  const rows=document.getElementById('leaderboard-rows');
  if(!rows)return;
  if(!S.leaders.length){
    rows.innerHTML=`<div style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted);
      text-align:center;padding:12px;animation:signalPulse 2s infinite;">Waiting for players…</div>`;
    return;
  }
  const medal=['🥇','🥈','🥉'];
  rows.innerHTML=S.leaders.slice(0,10).map((p,i)=>`
    <div class="leader-row ${p.id===S.playerId?'me':''}">
      <div class="leader-rank">${medal[i]||(i+1)}</div>
      <div class="leader-name">${esc(p.name)}${p.id===S.playerId?' <span style="color:#00f5d4;font-size:10px;font-family:Space Mono,monospace;">(you)</span>':''}</div>
      <div class="leader-dist">${S.hunt.showDist&&p.dist!=null?fmtDist(p.dist,S.hunt.units):'—'}</div>
    </div>`).join('');
}

// MAP
function initMap(){
  if(S.pickMap){S.pickMap.remove();S.pickMap=null;S.pickMarker=null;}
  const el=document.getElementById('map-picker');if(!el)return;
  S.pickMap=L.map('map-picker',{zoomControl:true,attributionControl:false}).setView([39.5,-98.35],3);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(S.pickMap);
  const icon=L.divIcon({
    className:'',
    html:`<div style="width:16px;height:16px;background:#ff2d78;border-radius:50%;
      box-shadow:0 0 16px #ff2d78,0 0 32px #ff2d7866;border:2px solid #fff;"></div>`,
    iconSize:[16,16],iconAnchor:[8,8]
  });
  S.pickMap.on('click',e=>{
    S.pickedLat=e.latlng.lat;S.pickedLon=e.latlng.lng;
    if(S.pickMarker) S.pickMarker.setLatLng(e.latlng);
    else S.pickMarker=L.marker(e.latlng,{icon}).addTo(S.pickMap);
    const conf=document.getElementById('map-confirm');
    const coords=document.getElementById('map-coord-text');
    const btn=document.getElementById('hidebtn');
    if(conf) conf.style.display='block';
    if(coords) coords.textContent=`${S.pickedLat.toFixed(4)}, ${S.pickedLon.toFixed(4)}`;
    if(btn) btn.disabled=false;
  });
}
function destroyMap(){
  if(S.pickMap){S.pickMap.remove();S.pickMap=null;S.pickMarker=null;}
  S.pickedLat=null;S.pickedLon=null;
}
async function searchAddress(){
  const q=(document.getElementById('addr-input')||{}).value||'';
  if(!q.trim())return;
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,{headers:{'Accept-Language':'en'}});
    const data=await res.json();
    if(data&&data[0]){
      const lat=parseFloat(data[0].lat),lon=parseFloat(data[0].lon);
      S.pickMap.setView([lat,lon],14);
      S.pickMap.fire('click',{latlng:L.latLng(lat,lon)});
    } else showErr('hide-err','Address not found — try a different search.');
  }catch(e){showErr('hide-err','Search failed — check connection.');}
}
function jumpToMyLocation(){
  const btn=document.getElementById('locbtn');
  if(!navigator.geolocation){showErr('hide-err','GPS not available.');return;}
  if(btn){btn.textContent='📡 Locating…';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      if(btn){btn.textContent='🎯 Jump to my location';btn.disabled=false;}
      if(S.pickMap){
        S.pickMap.setView([p.coords.latitude,p.coords.longitude],15);
        S.pickMap.fire('click',{latlng:L.latLng(p.coords.latitude,p.coords.longitude)});
      }
    },
    ()=>{
      if(btn){btn.textContent='🎯 Jump to my location';btn.disabled=false;}
      showErr('hide-err','Location blocked — tap the map instead.');
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}

// ACTIONS
function doHide(){
  if(S.pickedLat===null){showErr('hide-err','Tap the map to set a location first.');return;}
  const name=(document.getElementById('tname')||{}).value||'Hidden Treasure';
  const message=(document.getElementById('opt-message')||{}).value||'';
  const showDist=document.getElementById('opt-showdist').checked;
  const leaderboard=document.getElementById('opt-leaderboard').checked;
  const units=(document.getElementById('opt-units')||{}).value||'both';
  const radiusM=parseFloat(document.getElementById('opt-radius').value)||15;
  const hunt={lat:S.pickedLat,lon:S.pickedLon,name,message,showDist,leaderboard,units,radiusM,ts:Date.now()};
  destroyMap();S.hunt=hunt;S.shareCode=encode(hunt);S.screen='share';render();
}
function doJoin(){
  const raw=(document.getElementById('huntcode')||{}).value||'';
  const hunt=decode(raw);
  if(!hunt){showErr('join-err','Invalid code — check it and try again.');return;}
  S.hunt=hunt;S.screen='name';render();
}
function doStartHunt(){
  if(S.hunt&&S.hunt.leaderboard){
    const n=(document.getElementById('player-name')||{}).value.trim();
    if(!n){showErr('name-err','Please enter your name.');return;}
    S.playerName=n;
  }
  startHunt(S.hunt);
}
function goScreen(screen){stopHunt();destroyMap();S.screen=screen;render();}
function copyLink(url){
  const btn=document.getElementById('copybtn');
  const ok=()=>{
    if(btn){btn.textContent='✓ COPIED!';btn.style.background='linear-gradient(135deg,#00b894,#007a61)';}
    setTimeout(()=>{if(btn){btn.textContent='COPY LINK';btn.style.background='';}},2500);
  };
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(ok).catch(()=>clipFallback(url,ok));
  else clipFallback(url,ok);
}
function clipFallback(text,cb){
  const el=document.createElement('textarea');el.value=text;el.style.cssText='position:fixed;opacity:0;';
  document.body.appendChild(el);el.focus();el.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(el);
}

// HUNT ENGINE
function attachOrientation(){
  function onOrient(e){
    if(e.webkitCompassHeading!=null&&e.webkitCompassHeading!==0){
      S.heading=e.webkitCompassHeading;
    } else if(e.alpha!=null){
      S.heading=(360-e.alpha)%360;
    }
    const btn=document.getElementById('compass-btn-wrap');
    if(btn&&S.heading!=null) btn.style.display='none';
    if(S.gpsBearing!=null){
      S.displayBearing=(S.gpsBearing-S.heading+360)%360;
      updateCompass();
    }
  }
  window.addEventListener('deviceorientation',onOrient,true);
  S.orientHandler=onOrient;
}
function requestCompass(){
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission().then(r=>{if(r==='granted')attachOrientation();}).catch(()=>{});
  } else {attachOrientation();}
}
function startHunt(hunt){
  stopHunt();
  S.found=false;S.userPos=null;S.gpsBearing=null;S.displayBearing=null;S.heading=null;S.currentDist=null;
  S.playerId=S.playerId||('p'+Math.random().toString(36).slice(2,10));
  S.leaders=[];S.screen='hunt';render();
  if(!navigator.geolocation)return;
  if(typeof DeviceOrientationEvent!=='undefined'&&typeof DeviceOrientationEvent.requestPermission==='function'){
    const btn=document.getElementById('compass-btn-wrap');if(btn)btn.style.display='block';
  } else {attachOrientation();}
  if(hunt.leaderboard&&fbReady&&db){
    const hid=huntId(hunt);
    S.leaderRef=db.ref('hunts/'+hid+'/players');
    S.leaderUnsub=S.leaderRef.on('value',snap=>{
      const data=snap.val()||{};
      S.leaders=Object.entries(data).map(([id,v])=>({id,...v})).sort((a,b)=>(a.dist??Infinity)-(b.dist??Infinity));
      updateLeaderboard();
    });
  }
  S.watchId=navigator.geolocation.watchPosition(
    p=>{
      const here={lat:p.coords.latitude,lon:p.coords.longitude};
      const there={lat:hunt.lat,lon:hunt.lon};
      S.userPos=here;
      S.gpsBearing=calcBearing(here,there);
      S.displayBearing=S.heading!=null?(S.gpsBearing-S.heading+360)%360:S.gpsBearing;
      S.currentDist=calcDistance(here,there);
      if(S.currentDist<=(hunt.radiusM||15)&&!S.found)S.found=true;
      if(hunt.leaderboard&&fbReady&&db&&S.leaderRef){
        S.leaderRef.child(S.playerId).set({name:S.playerName||'Hunter',dist:Math.round(S.currentDist),ts:Date.now()});
      }
      updateCompass();
    },
    ()=>{},{enableHighAccuracy:true,maximumAge:2000,timeout:15000}
  );
}
function stopHunt(){
  if(S.watchId){navigator.geolocation.clearWatch(S.watchId);S.watchId=null;}
  if(S.orientHandler){window.removeEventListener('deviceorientation',S.orientHandler,true);S.orientHandler=null;}
  if(S.spinInterval){clearInterval(S.spinInterval);S.spinInterval=null;}
  if(S.leaderRef&&S.leaderUnsub){
    S.leaderRef.off('value',S.leaderUnsub);
    if(S.playerId)S.leaderRef.child(S.playerId).remove();
    S.leaderRef=null;S.leaderUnsub=null;
  }
}
function leaveHunt(){
  stopHunt();S.hunt=null;S.found=false;S.userPos=null;S.leaders=[];S.screen='home';render();
}

function showErr(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.classList.remove('hidden');}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

window.addEventListener('load',()=>{
  const p=new URLSearchParams(window.location.search);
  const code=p.get('hunt');
  if(code){const hunt=decode(code);if(hunt){S.hunt=hunt;S.screen='name';render();return;}}
  render();
});
</script>
