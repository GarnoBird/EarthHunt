*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100vh;}
body{

/* Scanline overlay */

  content:'';position:absolute;width:16px;height:16px;

}
.card::before{top:-1px;left:-1px;border-width:2px 0 0 2px;}
.card::after{bottom:-1px;right:-1px;border-width:0 2px 2px 0;}

// ── Math ──────────────────────────────────────────────────────────────────────
const EARTH_R=6371000;
function toRad(d){return d*Math.PI/180;}
function toDeg(r){return r*180/Math.PI;}
function calcBearing(from,to){
  const dLon=toRad(to.lon-from.lon),la1=toRad(from.lat),la2=toRad(to.lat);
  const y=Math.sin(dLon)*Math.cos(la2);
  const x=Math.cos(la1)*Math.sin(la2)-Math.sin(la1)*Math.cos(la2)*Math.cos(dLon);
  return(toDeg(Math.atan2(y,x))+360)%360;
}
function calcDistance(from,to){
  const dLat=toRad(to.lat-from.lat),dLon=toRad(to.lon-from.lon);
  const a=Math.sin(dLat/2)**2+Math.cos(toRad(from.lat))*Math.cos(toRad(to.lat))*Math.sin(dLon/2)**2;
  return EARTH_R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function cardinal(d){return["N","NE","E","SE","S","SW","W","NW"][Math.round(d/45)%8];}
function fmtDist(m,unit){
  if(unit==='ft') return Math.round(m*3.28084).toLocaleString()+'ft';
  if(unit==='m')  return Math.round(m).toLocaleString()+'m';
  const ft=Math.round(m*3.28084);
  return ft<1000?ft+'ft / '+Math.round(m)+'m':(m/1609.34).toFixed(1)+'mi / '+(m/1000).toFixed(1)+'km';
}

// ── Encode/Decode ─────────────────────────────────────────────────────────────
function encode(obj){
  return btoa(JSON.stringify(obj)).replace(/=/g,'').replace(/\+/g,'-').replace(/\//g,'_');
}
function decode(code){
  try{
    const b64=code.trim().replace(/-/g,'+').replace(/_/g,'/');
    const pad=(4-b64.length%4)%4;
    const obj=JSON.parse(atob(b64+'='.repeat(pad)));
    if(typeof obj.lat==='number'&&typeof obj.lon==='number') return obj;
  }catch(e){}
  return null;
}

// Hunt ID: stable hash of lat/lon/ts so each hunt has its own leaderboard
function huntId(hunt){
  const key=`${hunt.lat.toFixed(5)}_${hunt.lon.toFixed(5)}_${hunt.ts}`;
  let h=0;
  for(let i=0;i<key.length;i++){h=(Math.imul(31,h)+key.charCodeAt(i))|0;}
  return 'h'+(h>>>0).toString(36);
}

// ── COMPASS SVG ───────────────────────────────────────────────────────────────
function compassSVG(){
  const ticks=Array.from({length:72},(_,i)=>{
    const a=i*5,r=toRad(a-90),big=a%90===0,med=a%45===0,sm=a%15===0;
    const len=big?16:med?10:sm?6:3;
    const x1=120+104*Math.cos(r),y1=120+104*Math.sin(r);
    const x2=120+(104-len)*Math.cos(r),y2=120+(104-len)*Math.sin(r);
    const col=big?'#ff71ce':med?'#b967ff55':sm?'#ffffff22':'#ffffff11';
    return `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="${col}" stroke-width="${big?1.5:1}"/>`;
  }).join('');

  const labels=[['N',0],['E',90],['S',180],['W',270]].map(([l,deg])=>{
    const r=toRad(deg-90),x=120+88*Math.cos(r),y=120+88*Math.sin(r);
    const col=l==='N'?'#ff71ce':'#b967ff88';
    return `<text x="${x}" y="${y}" text-anchor="middle" dominant-baseline="middle"
      font-family="Orbitron,sans-serif" font-size="${l==='N'?11:9}" fill="${col}"
      font-weight="700" letter-spacing="2">${l}</text>`;
  }).join('');

  return `<svg id="compass-svg" width="240" height="240" viewBox="0 0 240 240" style="display:block;margin:0 auto;filter:drop-shadow(0 0 20px #ff71ce33);">
    <defs>
      <radialGradient id="cbg" cx="50%" cy="50%">
        <stop offset="0%" stop-color="#1a0030"/>
        <stop offset="100%" stop-color="#0d0015"/>
      </radialGradient>
    </defs>
    <circle cx="120" cy="120" r="119" fill="url(#cbg)" stroke="#ff71ce22" stroke-width="1"/>
    <circle cx="120" cy="120" r="108" fill="none" stroke="#b967ff11" stroke-width="1"/>
    ${ticks}${labels}
    <g id="compass-arrow" transform="rotate(0,120,120)">
      <polygon points="120,18 130,108 120,98 110,108" fill="#ff71ce" opacity=".95"/>
      <polygon points="120,222 130,132 120,142 110,132" fill="#b967ff" opacity=".4"/>
      <circle cx="120" cy="120" r="8" fill="#0d0015" stroke="#ff71ce" stroke-width="2"/>
      <circle cx="120" cy="120" r="3" fill="#ff71ce"/>
    </g>
  </svg>`;
}

// ── HUNT ──────────────────────────────────────────────────────────────────────
function tmplHunt(){
  const h=S.hunt;
  if(S.found){
    return `
    <div class="gap fade-in" style="align-items:center;text-align:center;">
      <div style="font-size:56px;animation:bounce 1s ease infinite;">🏆</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:22px;color:#ff71ce;letter-spacing:3px;font-weight:900;animation:glitch 2s infinite;">FOUND IT</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:#9d7fc4;letter-spacing:2px;">${esc(h.name)}</div>
      ${h.message?`
      <div style="border:1px solid #ff71ce44;border-radius:2px;padding:18px 20px;
        font-family:'Share Tech Mono',monospace;font-size:13px;line-height:1.8;
        color:#fffb96;text-align:center;background:#ff71ce08;width:100%;">
        ${esc(h.message)}
      </div>`:''}
      <button class="btn-secondary" onclick="leaveHunt()" style="margin-top:8px;">← LEAVE HUNT</button>
    </div>`;
  }

  const leaderSection=h.leaderboard?`
  <div id="leaderboard-section" style="width:100%;">
    <div class="label" style="margin-bottom:8px;">▸ LEADERBOARD</div>
    <div id="leaderboard-rows">
      <div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#9d7fc4;text-align:center;padding:10px;letter-spacing:1px;">// waiting for players…</div>
    </div>
  </div>`:'';

  return `
  <div class="gap fade-in" style="align-items:center;">
    <div style="text-align:center;">
      <div style="font-family:'Orbitron',sans-serif;font-size:10px;color:#b967ff;letter-spacing:4px;margin-bottom:4px;">// HUNTING //</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:13px;color:#ff71ce;letter-spacing:1px;">${esc(h.name)}</div>
    </div>

    ${compassSVG()}

    <div id="compass-btn-wrap" style="display:none;text-align:center;">
      <button class="btn-main" style="font-size:11px;padding:12px 20px;width:auto;" onclick="requestCompass()">◈ ENABLE COMPASS</button>
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#9d7fc4;margin-top:6px;letter-spacing:1px;">tap to activate bearing</div>
    </div>

    <div id="hunt-status" style="text-align:center;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:#9d7fc4;letter-spacing:2px;animation:pulse 2s infinite;">// acquiring signal…</div>
    </div>

    ${h.showDist?`<div id="hunt-dist" style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#b967ff;text-align:center;letter-spacing:2px;"></div>`:''}

    <div style="border:1px solid #ff71ce11;border-radius:2px;padding:10px 16px;text-align:center;width:100%;">
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#9d7fc455;letter-spacing:3px;line-height:1.9;">
        no map. no location.<br/>just a direction.
      </div>
    </div>

    ${leaderSection}

    <button class="btn-secondary" onclick="leaveHunt()" style="font-size:10px;">← LEAVE HUNT</button>
  </div>`;
}

// ── updateCompass ─────────────────────────────────────────────────────────────
function updateCompass(){
  if(S.found){render();return;}
  const arrow=document.getElementById('compass-arrow');
  const status=document.getElementById('hunt-status');
  const distEl=document.getElementById('hunt-dist');
  if(!arrow||!status) return;

  if(!S.userPos){
    if(!S.spinInterval){
      let deg=0;
      S.spinInterval=setInterval(()=>{
        deg=(deg+3)%360;
        const a=document.getElementById('compass-arrow');
        if(a) a.setAttribute('transform',`rotate(${deg},120,120)`);
        else{clearInterval(S.spinInterval);S.spinInterval=null;}
      },16);
    }
  } else {
    if(S.spinInterval){clearInterval(S.spinInterval);S.spinInterval=null;}
    arrow.setAttribute('transform',`rotate(${S.displayBearing},120,120)`);
    status.innerHTML=`
      <div style="font-family:'Share Tech Mono',monospace;font-size:10px;color:#b967ff;letter-spacing:3px;margin-bottom:6px;">THE TREASURE LIES</div>
      <div style="font-family:'Orbitron',sans-serif;font-size:42px;font-weight:900;color:#ff71ce;letter-spacing:2px;line-height:1;">${Math.round(S.displayBearing)}°</div>
      <div style="font-family:'Share Tech Mono',monospace;font-size:12px;color:#9d7fc4;margin-top:4px;letter-spacing:4px;">${cardinal(S.displayBearing)}</div>`;
    if(distEl&&S.currentDist!=null)
      distEl.textContent='◈ '+fmtDist(S.currentDist,S.hunt.units);
  }
}

// ── Leaderboard ───────────────────────────────────────────────────────────────
function updateLeaderboard(){
  const rows=document.getElementById('leaderboard-rows');
  if(!rows) return;
  if(!S.leaders.length){
    rows.innerHTML=`<div style="font-family:'Share Tech Mono',monospace;font-size:11px;color:#9d7fc4;text-align:center;padding:10px;letter-spacing:1px;">// waiting for players…</div>`;
    return;
  }
  rows.innerHTML=S.leaders.slice(0,10).map((p,i)=>`
    <div class="leader-row ${p.id===S.playerId?'me':''}">
      <div class="leader-rank">${i===0?'◈':i===1?'◇':i===2?'○':(i+1)}</div>
      <div class="leader-name">${esc(p.name)}${p.id===S.playerId?' <span style="color:#01cdfe;font-size:10px;">(you)</span>':''}</div>
      <div class="leader-dist">${S.hunt.showDist&&p.dist!=null?fmtDist(p.dist,S.hunt.units):'—'}</div>
    </div>`).join('');
}

// ── Map ───────────────────────────────────────────────────────────────────────
function initMap(){
  if(S.pickMap){S.pickMap.remove();S.pickMap=null;S.pickMarker=null;}
  const el=document.getElementById('map-picker');
  if(!el) return;
  S.pickMap=L.map('map-picker',{zoomControl:true,attributionControl:false}).setView([39.5,-98.35],3);
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{maxZoom:19,subdomains:'abcd'}).addTo(S.pickMap);
  const icon=L.divIcon({
    className:'',
    html:`<div style="width:12px;height:12px;background:#ff71ce;border-radius:50%;box-shadow:0 0 12px #ff71ce,0 0 24px #ff71ce88;border:2px solid #fff;"></div>`,
    iconSize:[12,12],iconAnchor:[6,6]
  });
  S.pickMap.on('click',e=>{
    S.pickedLat=e.latlng.lat;S.pickedLon=e.latlng.lng;
    if(S.pickMarker) S.pickMarker.setLatLng(e.latlng);
    else S.pickMarker=L.marker(e.latlng,{icon}).addTo(S.pickMap);
    const conf=document.getElementById('map-confirm');
    const coords=document.getElementById('map-coord-text');
    const btn=document.getElementById('hidebtn');
    if(conf) conf.style.display='block';
    if(coords) coords.textContent=`${S.pickedLat.toFixed(4)}, ${S.pickedLon.toFixed(4)}`;
    if(btn) btn.disabled=false;
  });
}
function destroyMap(){
  if(S.pickMap){S.pickMap.remove();S.pickMap=null;S.pickMarker=null;}
  S.pickedLat=null;S.pickedLon=null;
}
async function searchAddress(){
  const q=(document.getElementById('addr-input')||{}).value||'';
  if(!q.trim()) return;
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(q)}&limit=1`,
      {headers:{'Accept-Language':'en'}});
    const data=await res.json();
    if(data&&data[0]){
      const lat=parseFloat(data[0].lat),lon=parseFloat(data[0].lon);
      S.pickMap.setView([lat,lon],14);
      S.pickMap.fire('click',{latlng:L.latLng(lat,lon)});
    } else showErr('hide-err','// address not found');
  }catch(e){showErr('hide-err','// search failed — check connection');}
}
function jumpToMyLocation(){
  const btn=document.getElementById('locbtn');
  if(!navigator.geolocation){showErr('hide-err','// GPS not available');return;}
  if(btn){btn.textContent='// acquiring…';btn.disabled=true;}
  navigator.geolocation.getCurrentPosition(
    p=>{
      if(btn){btn.textContent='⊕ JUMP TO MY LOCATION';btn.disabled=false;}
      if(S.pickMap){
        S.pickMap.setView([p.coords.latitude,p.coords.longitude],15);
        S.pickMap.fire('click',{latlng:L.latLng(p.coords.latitude,p.coords.longitude)});
      }
    },
    ()=>{
      if(btn){btn.textContent='⊕ JUMP TO MY LOCATION';btn.disabled=false;}
      showErr('hide-err','// location blocked — tap map instead');
    },
    {enableHighAccuracy:true,timeout:10000}
  );
}

// ── Actions ───────────────────────────────────────────────────────────────────
function doHide(){
  if(S.pickedLat===null){showErr('hide-err','// tap the map to set a location');return;}
  const name=(document.getElementById('tname')||{}).value||'Hidden Treasure';
  const message=(document.getElementById('opt-message')||{}).value||'';
  const showDist=document.getElementById('opt-showdist').checked;
  const leaderboard=document.getElementById('opt-leaderboard').checked;
  const units=(document.getElementById('opt-units')||{}).value||'both';
  const radiusM=parseFloat(document.getElementById('opt-radius').value)||15;
  const hunt={lat:S.pickedLat,lon:S.pickedLon,name,message,showDist,leaderboard,units,radiusM,ts:Date.now()};
  destroyMap();
  S.hunt=hunt;
  S.shareCode=encode(hunt);
  S.screen='share';render();
}

function doJoin(){
  const raw=(document.getElementById('huntcode')||{}).value||'';
  const hunt=decode(raw);
  if(!hunt){showErr('join-err','// invalid code — check and retry');return;}
  S.hunt=hunt;S.screen='name';render();
}

function doStartHunt(){
  if(S.hunt&&S.hunt.leaderboard){
    const n=(document.getElementById('player-name')||{}).value.trim();
    if(!n){showErr('name-err','// callsign required');return;}
    S.playerName=n;
  }
  startHunt(S.hunt);
}

function goScreen(screen){
  stopHunt();destroyMap();S.screen=screen;render();
}

function copyLink(url){
  const btn=document.getElementById('copybtn');
  const ok=()=>{
    if(btn){btn.textContent='✓ COPIED';btn.style.color='#01cdfe';btn.style.borderColor='#01cdfe';}
    setTimeout(()=>{if(btn){btn.textContent='▶ COPY LINK';btn.style.color='';btn.style.borderColor='';}},2500);
  };
  if(navigator.clipboard) navigator.clipboard.writeText(url).then(ok).catch(()=>clipFallback(url,ok));
  else clipFallback(url,ok);
}
function clipFallback(text,cb){
  const el=document.createElement('textarea');
  el.value=text;el.style.cssText='position:fixed;opacity:0;';
  document.body.appendChild(el);el.focus();el.select();
  try{document.execCommand('copy');cb();}catch(e){}
  document.body.removeChild(el);
}

// ── Hunt engine ───────────────────────────────────────────────────────────────
function attachOrientation(){
  function onOrient(e){
    if(e.webkitCompassHeading!=null&&e.webkitCompassHeading!==0){
      S.heading=e.webkitCompassHeading;
    } else if(e.alpha!=null){
      S.heading=(360-e.alpha)%360;
    }
    const btn=document.getElementById('compass-btn-wrap');
    if(btn&&S.heading!=null) btn.style.display='none';
    if(S.gpsBearing!=null){
      S.displayBearing=(S.gpsBearing-S.heading+360)%360;
      updateCompass();
    }
  }
  window.addEventListener('deviceorientation',onOrient,true);
  S.orientHandler=onOrient;
}

function requestCompass(){
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    DeviceOrientationEvent.requestPermission()
      .then(r=>{if(r==='granted') attachOrientation();})
      .catch(()=>{});
  } else {
    attachOrientation();
  }
}

function startHunt(hunt){
  stopHunt();
  S.found=false;S.userPos=null;S.gpsBearing=null;S.displayBearing=null;S.heading=null;S.currentDist=null;
  S.playerId=S.playerId||('p'+Math.random().toString(36).slice(2,10));
  S.leaders=[];
  S.screen='hunt';render();

  if(!navigator.geolocation) return;

  // Compass
  if(typeof DeviceOrientationEvent!=='undefined'&&
     typeof DeviceOrientationEvent.requestPermission==='function'){
    const btn=document.getElementById('compass-btn-wrap');
    if(btn) btn.style.display='block';
  } else {
    attachOrientation();
  }

  // Firebase leaderboard — keyed per hunt using stable huntId
  if(hunt.leaderboard&&fbReady&&db){
    const hid=huntId(hunt);
    S.leaderRef=db.ref('hunts/'+hid+'/players');
    S.leaderUnsub=S.leaderRef.on('value',snap=>{
      const data=snap.val()||{};
      S.leaders=Object.entries(data)
        .map(([id,v])=>({id,...v}))
        .sort((a,b)=>(a.dist??Infinity)-(b.dist??Infinity));
      updateLeaderboard();
    });
  }

  // GPS
  S.watchId=navigator.geolocation.watchPosition(
    p=>{
      const here={lat:p.coords.latitude,lon:p.coords.longitude};
      const there={lat:hunt.lat,lon:hunt.lon};
      S.userPos=here;
      S.gpsBearing=calcBearing(here,there);
      S.displayBearing=S.heading!=null?(S.gpsBearing-S.heading+360)%360:S.gpsBearing;
      S.currentDist=calcDistance(here,there);
      if(S.currentDist<=(hunt.radiusM||15)&&!S.found) S.found=true;
      // Push to leaderboard — playerId is key so only 1 row per player
      if(hunt.leaderboard&&fbReady&&db&&S.leaderRef){
        S.leaderRef.child(S.playerId).set({
          name:S.playerName||'Hunter',
          dist:Math.round(S.currentDist),
          ts:Date.now()
        });
      }
      updateCompass();
    },
    ()=>{},
    {enableHighAccuracy:true,maximumAge:2000,timeout:15000}
  );
}

function stopHunt(){
  if(S.watchId){navigator.geolocation.clearWatch(S.watchId);S.watchId=null;}
  if(S.orientHandler){window.removeEventListener('deviceorientation',S.orientHandler,true);S.orientHandler=null;}
  if(S.spinInterval){clearInterval(S.spinInterval);S.spinInterval=null;}
  if(S.leaderRef&&S.leaderUnsub){
    S.leaderRef.off('value',S.leaderUnsub);
    // Remove player from leaderboard on leave
    if(S.playerId) S.leaderRef.child(S.playerId).remove();
    S.leaderRef=null;S.leaderUnsub=null;
  }
}

function leaveHunt(){
  stopHunt();
  S.hunt=null;S.found=false;S.userPos=null;S.leaders=[];
  S.screen='home';render();
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function showErr(id,msg){
  const el=document.getElementById(id);
  if(el){el.textContent=msg;el.classList.remove('hidden');}
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────────
window.addEventListener('load',()=>{
  const p=new URLSearchParams(window.location.search);
  const code=p.get('hunt');
  if(code){
    const hunt=decode(code);
    if(hunt){S.hunt=hunt;S.screen='name';render();return;}
  }
  render();
});
</script>
